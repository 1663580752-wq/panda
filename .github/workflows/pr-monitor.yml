name: Monitor upstream PR

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4

      - name: Monitor commaai/panda PR 2406
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: commaai/panda
          TARGET_PR: '2406'
        run: |
          set -euo pipefail

          pr_json="$(gh pr view "$TARGET_PR" --repo "$TARGET_REPO" --json url,title,state,mergedAt,closedAt,headRefOid,reviewDecision,statusCheckRollup)"
          comments_json="$(gh api "repos/$TARGET_REPO/issues/$TARGET_PR/comments")"
          review_comments_json="$(gh api "repos/$TARGET_REPO/pulls/$TARGET_PR/comments")"

          state="$(jq -r '.state' <<<"$pr_json")"
          title="$(jq -r '.title' <<<"$pr_json")"
          url="$(jq -r '.url' <<<"$pr_json")"
          sha="$(jq -r '.headRefOid' <<<"$pr_json")"
          review_decision="$(jq -r '.reviewDecision // ""' <<<"$pr_json")"
          comment_count="$(jq 'length' <<<"$comments_json")"
          review_comment_count="$(jq 'length' <<<"$review_comments_json")"
          checks_summary="$(jq -r '[.statusCheckRollup[]? | ((.name // .context // "unknown") + ":" + (.conclusion // .state // .status // "unknown"))] | join(", ")' <<<"$pr_json")"
          snapshot="state=$state|sha=$sha|review=$review_decision|comments=$comment_count|review_comments=$review_comment_count|checks=$checks_summary"

          mkdir -p monitor
          previous_snapshot=""
          if [[ -f monitor/pr-2406-status.md ]]; then
            previous_snapshot="$(sed -n 's/^<!-- snapshot: \(.*\) -->$/\1/p' monitor/pr-2406-status.md | head -1)"
          fi

          {
            echo "<!-- snapshot: $snapshot -->"
            echo "# PR 自动监控报告"
            echo
            echo "- 目标 PR: $url"
            echo "- 标题: $title"
            echo "- 状态: $state"
            echo "- Head SHA: $sha"
            echo "- Review decision: ${review_decision:-无}"
            echo "- 普通评论数: $comment_count"
            echo "- Review 评论数: $review_comment_count"
            echo "- CI/Checks: ${checks_summary:-暂无可见状态}"
            echo "- 最近检查时间 UTC: $(date -u +'%Y-%m-%d %H:%M:%S')"
            echo
            echo "## 中文处理说明"
            if [[ "$state" == "MERGED" ]]; then
              echo "PR 已合并。下一步需要检查赏金/付款流程，并准备联系项目方。"
            elif [[ "$state" == "CLOSED" ]]; then
              echo "PR 已关闭。需要查看关闭原因，然后复盘并选择下一个任务。"
            elif [[ "$comment_count" != "0" || "$review_comment_count" != "0" ]]; then
              echo "PR 有评论或 review comment。需要回到 Codex 让它翻译评论、修改代码并回复维护者。"
            else
              echo "暂无维护者评论，继续等待。"
            fi
            echo
            echo "## 状态变化"
            if [[ "$previous_snapshot" != "$snapshot" ]]; then
              echo "- 有变化。"
              echo "- 旧状态: ${previous_snapshot:-无}"
              echo "- 新状态: $snapshot"
            else
              echo "- 无变化。"
            fi
          } > monitor/pr-2406-status.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor/pr-2406-status.md
          if git diff --cached --quiet; then
            echo "No monitor changes."
          else
            git commit -m "Update PR 2406 monitor status"
            git push
          fi
